input {
  http {
    port => 8080
    codec => json
  }
}

filter {

  # Split resourceLogs array
  split {
    field => "[resourceLogs]"
  }

  # Split scopeLogs array
  split {
    field => "[resourceLogs][scopeLogs]"
  }

  # Split logRecords array
  split {
    field => "[resourceLogs][scopeLogs][logRecords]"
  }

  # Extract core fields
  mutate {
    add_field => {
      "message" => "%{[resourceLogs][scopeLogs][logRecords][body][stringValue]}"
      "severity" => "%{[resourceLogs][scopeLogs][logRecords][severityText]}"
      "traceId" => "%{[resourceLogs][scopeLogs][logRecords][traceId]}"
      "spanId" => "%{[resourceLogs][scopeLogs][logRecords][spanId]}"
    }
  }

  # Convert OTEL nanoseconds timestamp to proper @timestamp
  ruby {
    code => '
      t = event.get("[resourceLogs][scopeLogs][logRecords][timeUnixNano]")
      if t
        event.set("@timestamp", LogStash::Timestamp.at(t.to_i / 1000000000.0))
      end
    '
  }

  # Extract resource attributes (service.name, etc.)
  ruby {
    code => '
      attrs = event.get("[resourceLogs][resource][attributes]")
      if attrs
        attrs.each do |a|
          key = a["key"]
          value = a["value"]["stringValue"] rescue nil
          event.set(key, value) if key && value
        end
      end
    '
  }

  # Extract log attributes (application, environment, etc.)
  ruby {
    code => '
      attrs = event.get("[resourceLogs][scopeLogs][logRecords][attributes]")
      if attrs
        attrs.each do |a|
          key = a["key"]
          value = a["value"]["stringValue"] rescue nil
          event.set(key, value) if key && value
        end
      end
    '
  }

  # Remove huge OTLP structure (cleanup)
  mutate {
    remove_field => ["resourceLogs"]
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "otel-logs-%{+YYYY.MM.dd}"
  }

  stdout { codec => rubydebug }
}
