global:
  scrape_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['172.32.23.7:9093']

rule_files:
  - "/etc/prometheus/alert.rules.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['172.32.23.2:9090']

  - job_name: 'node_exporter'
    static_configs:
      - targets: ['172.32.23.4:9100']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['172.32.23.5:8080']

  - job_name: 'docker_metrics'
    static_configs:
      - targets: ['172.32.23.6:9485']
  
  - job_name: 'blackbox'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - https://localhost
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: 172.32.23.8:9115      

  - job_name: 'otel-collector'
    static_configs:
      - targets: ['172.32.23.6:9999']

